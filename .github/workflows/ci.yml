name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: build & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  race: '-race' }
          - { os: macos-latest,   race: '-race' }
          - { os: windows-latest, race: '' } # race detector needs a C toolchain; skip on Windows
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive # noVNC is embedded via go:embed; build fails without it

      - uses: actions/setup-go@v6
        with:
          go-version: '1.24'
          check-latest: true

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ${{ matrix.race }} ./...

  format:
    name: gofmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        # no submodules needed: gofmt only inspects first-party .go files

      - uses: actions/setup-go@v6
        with:
          go-version: '1.24'
          check-latest: true

      - name: gofmt
        run: |
          unformatted=$(gofmt -l cmd internal scripts)
          if [ -n "$unformatted" ]; then
            echo "::error::These files are not gofmt-clean:"
            echo "$unformatted"
            exit 1
          fi
